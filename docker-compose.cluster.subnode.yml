services:
  flow-captcha-subnode:
    build:
      context: .
      dockerfile: Dockerfile.headed
    container_name: flow-captcha-subnode
    ports:
      - "8061:8060"
    environment:
      - ALLOW_DOCKER_HEADED_CAPTCHA=true
      - DISPLAY=:99
      - FCS_SERVER_HOST=0.0.0.0
      - FCS_SERVER_PORT=8060
      - FCS_CLUSTER_ROLE=subnode
      - FCS_NODE_NAME=subnode-1
      - FCS_CLUSTER_MASTER_BASE_URL=http://host.docker.internal:8060
      - FCS_CLUSTER_MASTER_CLUSTER_KEY=replace-with-master-cluster-key
      - FCS_CLUSTER_NODE_PUBLIC_BASE_URL=http://host.docker.internal:8061
      - FCS_CLUSTER_NODE_API_KEY=replace-with-node-internal-key
      - FCS_CLUSTER_NODE_WEIGHT=100
      - FCS_CLUSTER_NODE_MAX_CONCURRENCY=1
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
